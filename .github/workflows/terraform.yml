name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/terraform.yml'
      - '**/*.tf'
      - '**/*.lock.hcl'
  pull_request:
    paths:
      - '.github/workflows/terraform.yml'
      - '**/*.tf'
      - '**/*.lock.hcl'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory:
          - terraform/web
          - terraform/org

    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run checks
        uses: langri-sha/github/actions/terraform@v0.10.2
        with:
          terraform-version: 1.15.5
          working-directory: ${{ matrix.working-directory }}
